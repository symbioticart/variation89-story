<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CORE — Variation 89 (story)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #1a1a1a; display: flex; align-items: center; justify-content: center; }
    #story { height: 100vh; width: auto; max-width: 100vw; box-shadow: 0 0 80px rgba(0,0,0,.5); }
    #off { position: fixed; left: -5000px; top: 0; }
    /* invisible save zone — tap the top-left corner to download the poster PNG */
    #dl { position: fixed; top: 0; left: 0; width: 150px; height: 150px; z-index: 999; cursor: pointer; opacity: 0; }
  </style>
</head>
<body>
  <canvas id="story" width="1080" height="1920"></canvas>
  <div id="dl" title="Save PNG" aria-label="Download poster"></div>
  <div id="off"></div>

  <script src="https://cdn.jsdelivr.net/npm/p5@2.2.0/lib/p5.min.js"></script>
  <script src="p5.oil.js"></script>
  <script src="painter.js"></script>
  <script>
    // ===== export geometry (matches the site: #fafafa wall, framed ivory painting) =====
    const W = 1080, H = 1920;
    const WALL = '#fafafa';               // page wall (NOT ivory) — same as the site
    const INK  = '#1a1a1a';               // site --ink
    const DOT_GREEN = '#2a9d8f';          // site live dot
    const INCEPTION = '2022-05-24';       // the work has been alive since this day

    // framed portrait painting, with margins / outline / shadow like the site
    // top margin 150 == gap frame→plate (≈ "hung object" symmetry, per artist)
    const FX = 80, FY = 150, PW = 920, PH = 1130;   // painting box; bottom = 1280

    const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    const fmtDate = d => { const [y,m,da] = d.split('-'); return da + ' ' + MONTHS[+m-1] + ' ' + y; };
    const params = new URLSearchParams(location.search);

    async function run() {
      try {
        const DATA = await fetch('data/daily-metrics.json', { cache: 'no-store' }).then(r => r.json());
        let idx = Math.max(0, DATA.days.length - 1);
        if (params.has('day')) idx = Math.max(0, Math.min(DATA.days.length - 1, +params.get('day')));
        const day = DATA.days[idx];

        await Promise.all([
          document.fonts.load('400 26px Manrope'),
          document.fonts.load('300 17px "JetBrains Mono"'),
        ]).catch(function(){});
        await document.fonts.ready;

        var canvasEl = null, pending = true;
        new p5(function (p) {
          p.setup = function () {
            if (p.pixelDensity) p.pixelDensity(1);     // export res = logical px, no retina overdraw
            var c = p.createCanvas(PW, PH, p.WEBGL2 || p.WEBGL);  // PORTRAIT painting buffer
            c.parent('off'); canvasEl = c.elt; p.noLoop();
          };
          p.draw = function () {
            if (!pending) return; pending = false;
            try {
              var pd = p.pixelDensity ? p.pixelDensity() : 1;
              OuraPainter.paintDay(p, day, DATA, PW * pd, PH * pd);   // fill the painting buffer
              requestAnimationFrame(function () {
                try { composite(canvasEl, DATA, day); window.__STORY_READY = true; }
                catch (e) { showErr(e); }
              });
            } catch (e) { showErr(e); }
          };
        });
      } catch (e) { showErr(e); }
    }

    function showErr(e) {
      window.__STORY_ERR = String((e && e.stack) || e);
      var ctx = document.getElementById('story').getContext('2d');
      ctx.fillStyle = WALL; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#902020'; ctx.textAlign = 'left'; ctx.font = '300 26px "JetBrains Mono"';
      ctx.fillText('CORE ERROR: ' + String((e && e.message) || e).slice(0, 70), 60, 200);
    }

    function alphaInk(a) { return 'rgba(26,26,26,' + a + ')'; }

    // durational line — recomputed from inception to the server's today (grows daily)
    function lifespanText(DATA) {
      var today = (DATA.meta && DATA.meta.serverDate) || new Date().toISOString().slice(0, 10);
      var days = Math.max(0, Math.round((Date.parse(today) - Date.parse(INCEPTION)) / 864e5));
      var years = Math.floor(days / 365.25);
      var yWord = years === 1 ? 'YEAR' : 'YEARS';
      return 'ALIVE FOR ' + years + ' ' + yWord + ' · ' + days.toLocaleString('en-US') + ' DAYS · SINCE ' + fmtDate(INCEPTION);
    }

    // save the full-res 1080×1920 poster as a PNG to the device
    function downloadPNG() {
      var canvas = document.getElementById('story');
      var d = window.__dlDay;
      var name = 'variation-89-' + (d && d.day ? d.day : 'today') + '.png';
      canvas.toBlob(function (blob) {
        if (!blob) return;
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = name;
        document.body.appendChild(a); a.click();
        setTimeout(function () { URL.revokeObjectURL(a.href); a.remove(); }, 1500);
      }, 'image/png');
    }
    document.getElementById('dl').addEventListener('click', downloadPNG);

    function composite(p5canvas, DATA, day) {
      var dead = params.has('dead');
      window.__dlDay = day;                 // remember which day, for the PNG filename
      var ctx = document.getElementById('story').getContext('2d');

      // ===== wall =====
      ctx.fillStyle = WALL; ctx.fillRect(0, 0, W, H);

      // ===== framed painting: soft drop shadow + #000 backing + thin outline (the site frame) =====
      // shadow kept faint + even (a plate-mounted work, not a poster bevel), per artist
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.09)';
      ctx.shadowBlur = 55; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 18;
      ctx.fillStyle = '#000';
      ctx.fillRect(FX, FY, PW, PH);
      ctx.restore();

      if (dead) { ctx.save(); ctx.filter = 'grayscale(0.85) opacity(0.5)'; ctx.drawImage(p5canvas, FX, FY, PW, PH); ctx.restore(); }
      else { ctx.drawImage(p5canvas, FX, FY, PW, PH); }

      // thin outline, like .canvas-frame outline: 1px rgba(0,0,0,.08)
      ctx.strokeStyle = 'rgba(0,0,0,0.09)'; ctx.lineWidth = 1;
      ctx.strokeRect(FX + 0.5, FY + 0.5, PW - 1, PH - 1);

      // ===== plate (museum label) — site DNA, quiet, all above IG reply-bar (≤1538) =====
      // Hierarchy descends in all three channels: size, opacity, width. No divider (pure wall).
      ctx.textAlign = 'center';
      var cx = W / 2;
      var DOT = '  ·  ';

      // TITLE — Manrope 400, 24px, ls 0.15em, uppercase. main @.75 / year @.55
      var tY = 1424;
      ctx.font = '400 24px Manrope';
      try { ctx.letterSpacing = '3.6px'; } catch (e) {}
      var titleMain = 'VARIATION 89';
      var titleYear = '   ·   2022—TODAY';
      var wMain = ctx.measureText(titleMain).width;
      var wYear = ctx.measureText(titleYear).width;
      var startX = cx - (wMain + wYear) / 2;
      ctx.textAlign = 'left';
      ctx.fillStyle = alphaInk(0.75); ctx.fillText(titleMain, startX, tY);
      ctx.fillStyle = alphaInk(0.55); ctx.fillText(titleYear, startX + wMain, tY);
      ctx.textAlign = 'center';

      // SUB — durational lifespan line. JetBrains Mono 300, 17px, ls 0.14em, uppercase, @.5 ; green "alive" dot
      var sY = 1468;
      ctx.font = '300 17px "JetBrains Mono"';
      try { ctx.letterSpacing = '2.2px'; } catch (e) {}
      var subText = dead ? 'SIGNAL LOST' : lifespanText(DATA);
      ctx.fillStyle = alphaInk(0.5);
      if (dead) {
        ctx.fillText(subText, cx, sY);
      } else {
        // center the WHOLE unit (dot + gap + text), not the text alone
        var r = 3.5, gap = 12;
        var subW = ctx.measureText(subText).width;
        var unitW = r * 2 + gap + subW;
        var uStart = cx - unitW / 2;
        ctx.save(); ctx.beginPath(); ctx.arc(uStart + r, sY - 5, r, 0, Math.PI * 2);
        ctx.fillStyle = DOT_GREEN; ctx.fill(); ctx.restore();
        ctx.textAlign = 'left'; ctx.fillStyle = alphaInk(0.5);
        ctx.fillText(subText, uStart + r * 2 + gap, sY);
        ctx.textAlign = 'center';
      }

      // MEDIUM — provenance credit, two meaning-grouped lines (museum credit wrap).
      // JetBrains Mono 300, 15px, ls 0.10em, uppercase. Keeps symbiotic art + Oura Ring.
      ctx.font = '300 15px "JetBrains Mono"';
      try { ctx.letterSpacing = '1.5px'; } catch (e) {}
      ctx.fillStyle = alphaInk(0.38);
      ctx.fillText('SYMBIOTIC PAINTING · GENERATIVE OIL', cx, 1506);
      ctx.fillStyle = alphaInk(0.34);
      ctx.fillText('LIVE OURA RING BIOMETRICS', cx, 1532);
      try { ctx.letterSpacing = '0px'; } catch (e) {}

      window.__STORY_READY = true;
    }

    run();
  </script>
</body>
</html>
